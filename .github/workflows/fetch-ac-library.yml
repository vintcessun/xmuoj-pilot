name: Fetch AC Library

# 手动触发：启动前填入 contest_id；账号/密码从仓库 Secret 读取。
# 多账号（推荐）：配置 Secret  XMUOJ_ACCOUNTS  ，多行，每行一个：
#   user1:pass1
#   user2:pass2
#   （也支持空格/逗号分隔，或写成 JSON 数组 [{"username":"u1","password":"p1"}]）
# 单账号（可选，未配 XMUOJ_ACCOUNTS 时使用）：Secret  XMUOJ_USERNAME / XMUOJ_PASSWORD 。
# 若要发布为可访问页面：Settings -> Pages -> Source 选 "GitHub Actions"。

on:
  workflow_dispatch:
    inputs:
      contest_id:
        description: "比赛 ID"
        required: true
        type: string
      contest_password:
        description: "比赛密码（可选）"
        required: false
        type: string
      username:
        description: "账号（可选；留空则用 Secret XMUOJ_USERNAME）"
        required: false
        type: string

permissions:
  contents: write
  pages: write
  id-token: write

# 避免并发的两次抓取互相覆盖提交
concurrency:
  group: fetch-ac-library
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Fetch AC code
        env:
          XMUOJ_PILOT_ACCOUNTS: ${{ secrets.XMUOJ_ACCOUNTS }}
          XMUOJ_PILOT_USERNAME: ${{ inputs.username != '' && inputs.username || secrets.XMUOJ_USERNAME }}
          XMUOJ_PILOT_PASSWORD: ${{ secrets.XMUOJ_PASSWORD }}
          XMUOJ_PILOT_CONTEST_ID: ${{ inputs.contest_id }}
          XMUOJ_PILOT_CONTEST_PASSWORD: ${{ inputs.contest_password }}
          XMUOJ_PILOT_VERIFY_SSL: "false"
        run: uv run python scripts/fetch_ac_library.py

      - name: Commit library back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ac-library
          if git diff --cached --quiet; then
            echo "AC 代码库无变化，跳过提交。"
          else
            git commit -m "chore: update AC library for contest ${{ inputs.contest_id }}"
            git push
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ac-library
          path: ac-library

      # 自动启用 Pages（首次运行无需手动去 Settings 打开）
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ac-library

  deploy:
    needs: fetch
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
